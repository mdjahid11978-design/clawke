name: Release Client Builds

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  # ── Android APK ──────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        working-directory: client
        run: flutter pub get

      - name: Generate code (Drift ORM)
        working-directory: client
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Restore Android Firebase config
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          test -n "$ANDROID_GOOGLE_SERVICES_JSON_BASE64"
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 -d > client/android/app/google-services.json

      - name: Build APK
        working-directory: client
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk

  # ── macOS ────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        working-directory: client
        run: flutter pub get

      - name: Generate code (Drift ORM)
        working-directory: client
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify macOS production APNs entitlement
        run: |
          APNS_ENV=$(/usr/libexec/PlistBuddy -c 'Print :com.apple.developer.aps-environment' client/macos/Runner/Release.entitlements)
          echo "macOS Release APNs environment: ${APNS_ENV}"
          test "$APNS_ENV" = "production"

      - name: Import macOS signing assets
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_PROVISION_PROFILE_BASE64: ${{ secrets.MACOS_PROVISION_PROFILE_BASE64 }}
        run: |
          test -n "$MACOS_CERTIFICATE_BASE64"
          test -n "$MACOS_CERTIFICATE_PASSWORD"
          test -n "$MACOS_PROVISION_PROFILE_BASE64"

          CERT_PATH="$RUNNER_TEMP/macos-signing.p12"
          PROFILE_PATH="$RUNNER_TEMP/macos.provisionprofile"
          KEYCHAIN_PATH="$RUNNER_TEMP/clawke-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          echo "$MACOS_CERTIFICATE_BASE64" | base64 -D > "$CERT_PATH"
          echo "$MACOS_PROVISION_PROFILE_BASE64" | base64 -D > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/clawke-macos.provisionprofile"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          SIGN_IDENTITY_HASH="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/[A-F0-9]{40}/ {print $2; exit}')"
          test -n "$SIGN_IDENTITY_HASH"
          echo "MACOS_SIGN_IDENTITY_HASH=$SIGN_IDENTITY_HASH" >> "$GITHUB_ENV"
          echo "MACOS_SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Prepare unsigned macOS build for manual signing
        working-directory: client/macos
        run: |
          # Modify pbxproj directly (pbxproj settings override xcconfig)
          sed -i '' 's/CODE_SIGN_STYLE = Automatic/CODE_SIGN_STYLE = Manual/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGN_IDENTITY\[sdk=macosx\*\]" = "Apple Development"/"CODE_SIGN_IDENTITY[sdk=macosx*]" = "-"/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = "-"/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_ENTITLEMENTS = .*;//g' Runner.xcodeproj/project.pbxproj
          # Build universal binary (arm64 + x86_64)
          sed -i '' 's/ONLY_ACTIVE_ARCH = YES/ONLY_ACTIVE_ARCH = NO/g' Runner.xcodeproj/project.pbxproj
          # Also set via xcconfig as fallback
          echo 'CODE_SIGNING_REQUIRED = NO' >> Flutter/Release.xcconfig
          echo 'CODE_SIGNING_ALLOWED = NO' >> Flutter/Release.xcconfig
          echo 'ONLY_ACTIVE_ARCH = NO' >> Flutter/Release.xcconfig

      - name: Build macOS
        working-directory: client
        run: flutter build macos --release

      - name: Sign and verify macOS production app
        run: |
          test -n "$MACOS_SIGN_IDENTITY_HASH"
          test -n "$MACOS_SIGNING_KEYCHAIN"

          assert_signature_has_certificate() {
            local target="$1"
            local prefix="$RUNNER_TEMP/codesign-cert-$(uuidgen)-"
            codesign -d --extract-certificates="$prefix" "$target" >/dev/null 2>&1 || true
            if [ ! -s "${prefix}0" ]; then
              echo "::error::Code signature has no embedded signing certificate: $target"
              exit 1
            fi
          }

          APP_PATH="client/build/macos/Build/Products/Release/clawke.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find client/build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -1)
          fi

          cp "$RUNNER_TEMP/macos.provisionprofile" "$APP_PATH/Contents/embedded.provisionprofile"
          security cms -D -i "$RUNNER_TEMP/macos.provisionprofile" > "$RUNNER_TEMP/macos-profile.plist"
          APP_ID_PREFIX=$(/usr/libexec/PlistBuddy -c 'Print :ApplicationIdentifierPrefix:0' "$RUNNER_TEMP/macos-profile.plist")
          PROFILE_APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "$RUNNER_TEMP/macos-profile.plist")
          export APP_ID_PREFIX
          export APP_ID_PREFIX_PLACEHOLDER='$(AppIdentifierPrefix)'
          cp client/macos/Runner/Release.entitlements "$RUNNER_TEMP/macos-release.entitlements"
          perl -0pi -e 's/\Q$ENV{APP_ID_PREFIX_PLACEHOLDER}\E/$ENV{APP_ID_PREFIX}./g' "$RUNNER_TEMP/macos-release.entitlements"

          codesign --force --deep --options runtime --timestamp \
            --keychain "$MACOS_SIGNING_KEYCHAIN" \
            --sign "$MACOS_SIGN_IDENTITY_HASH" \
            --entitlements "$RUNNER_TEMP/macos-release.entitlements" \
            "$APP_PATH"
          security delete-keychain "$MACOS_SIGNING_KEYCHAIN"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          assert_signature_has_certificate "$APP_PATH"
          find "$APP_PATH/Contents/Frameworks" -maxdepth 1 -name "*.framework" -type d -print0 | while IFS= read -r -d '' framework; do
            assert_signature_has_certificate "$framework"
          done

          codesign -d --entitlements - "$APP_PATH" > "$RUNNER_TEMP/macos-entitlements.txt" 2>/dev/null
          cat "$RUNNER_TEMP/macos-entitlements.txt"
          grep -q "com.apple.developer.aps-environment" "$RUNNER_TEMP/macos-entitlements.txt"
          grep -q "production" "$RUNNER_TEMP/macos-entitlements.txt"
          grep -q "$PROFILE_APP_ID" "$RUNNER_TEMP/macos-entitlements.txt"

      - name: Create DMG
        run: |
          APP_PATH="client/build/macos/Build/Products/Release/clawke.app"
          # Fallback: find the .app if name differs
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find client/build/macos/Build/Products/Release -name "*.app" -maxdepth 1 | head -1)
          fi
          bash scripts/create_macos_dmg.sh "$APP_PATH" Clawke-macOS.dmg Clawke

      - name: Notarize and staple DMG
        env:
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
          APPLE_NOTARY_KEY_BASE64: ${{ secrets.APPLE_NOTARY_KEY_BASE64 }}
        run: |
          test -n "$APPLE_NOTARY_KEY_ID"
          test -n "$APPLE_NOTARY_ISSUER_ID"
          test -n "$APPLE_NOTARY_KEY_BASE64"

          assert_signature_has_certificate() {
            local target="$1"
            local prefix="$RUNNER_TEMP/codesign-cert-$(uuidgen)-"
            codesign -d --extract-certificates="$prefix" "$target" >/dev/null 2>&1 || true
            if [ ! -s "${prefix}0" ]; then
              echo "::error::Code signature has no embedded signing certificate: $target"
              exit 1
            fi
          }

          hdiutil verify Clawke-macOS.dmg

          NOTARY_KEY="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"
          echo "$APPLE_NOTARY_KEY_BASE64" | base64 -D > "$NOTARY_KEY"
          chmod 600 "$NOTARY_KEY"

          xcrun notarytool submit Clawke-macOS.dmg \
            --key "$NOTARY_KEY" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            --wait

          xcrun stapler staple Clawke-macOS.dmg
          hdiutil verify Clawke-macOS.dmg

          VERIFY_MOUNT="$RUNNER_TEMP/clawke-dmg-verify"
          mkdir -p "$VERIFY_MOUNT"
          hdiutil attach Clawke-macOS.dmg -readonly -nobrowse -mountpoint "$VERIFY_MOUNT" >/dev/null
          trap 'hdiutil detach "$VERIFY_MOUNT" >/dev/null 2>&1 || true' EXIT
          DMG_APP_PATH="$(find "$VERIFY_MOUNT" -maxdepth 1 -name "*.app" -type d | head -1)"
          test -n "$DMG_APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$DMG_APP_PATH"
          assert_signature_has_certificate "$DMG_APP_PATH"
          find "$DMG_APP_PATH/Contents/Frameworks" -maxdepth 1 -name "*.framework" -type d -print0 | while IFS= read -r -d '' framework; do
            assert_signature_has_certificate "$framework"
          done
          spctl --assess --type execute --verbose=4 "$DMG_APP_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: Clawke-macOS.dmg

  # ── Verify published macOS asset ─────────────────────────────
  verify-macos-release:
    needs: release
    runs-on: macos-latest
    steps:
      - name: Download and verify published macOS DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assert_signature_has_certificate() {
            local target="$1"
            local prefix="$RUNNER_TEMP/codesign-cert-$(uuidgen)-"
            codesign -d --extract-certificates="$prefix" "$target" >/dev/null 2>&1 || true
            if [ ! -s "${prefix}0" ]; then
              echo "::error::Code signature has no embedded signing certificate: $target"
              exit 1
            fi
          }

          TAG="${GITHUB_REF_NAME}"
          VERIFY_DIR="$RUNNER_TEMP/release-verify"
          mkdir -p "$VERIFY_DIR"
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "Clawke-${TAG}-macOS.dmg" \
            --dir "$VERIFY_DIR" \
            --clobber

          DMG_PATH="$VERIFY_DIR/Clawke-${TAG}-macOS.dmg"
          hdiutil verify "$DMG_PATH"

          VERIFY_MOUNT="$RUNNER_TEMP/clawke-release-dmg-verify"
          mkdir -p "$VERIFY_MOUNT"
          hdiutil attach "$DMG_PATH" -readonly -nobrowse -mountpoint "$VERIFY_MOUNT" >/dev/null
          trap 'hdiutil detach "$VERIFY_MOUNT" >/dev/null 2>&1 || true' EXIT

          DMG_APP_PATH="$(find "$VERIFY_MOUNT" -maxdepth 1 -name "*.app" -type d | head -1)"
          test -n "$DMG_APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$DMG_APP_PATH"
          assert_signature_has_certificate "$DMG_APP_PATH"
          find "$DMG_APP_PATH/Contents/Frameworks" -maxdepth 1 -name "*.framework" -type d -print0 | while IFS= read -r -d '' framework; do
            assert_signature_has_certificate "$framework"
          done
          codesign -d --entitlements - "$DMG_APP_PATH" > "$RUNNER_TEMP/macos-release-entitlements.txt" 2>/dev/null
          cat "$RUNNER_TEMP/macos-release-entitlements.txt"
          grep -q "com.apple.developer.aps-environment" "$RUNNER_TEMP/macos-release-entitlements.txt"
          grep -q "production" "$RUNNER_TEMP/macos-release-entitlements.txt"
          spctl --assess --type execute --verbose=4 "$DMG_APP_PATH"

  # ── Windows ──────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        working-directory: client
        run: flutter pub get

      - name: Generate code (Drift ORM)
        working-directory: client
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows
        working-directory: client
        run: flutter build windows --release

      - name: Create ZIP
        run: |
          Compress-Archive -Path "client\build\windows\x64\runner\Release\*" -DestinationPath "Clawke-windows-x64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: Clawke-windows-x64.zip

  # ── Linux ────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev

      - name: Install dependencies
        working-directory: client
        run: flutter pub get

      - name: Generate code (Drift ORM)
        working-directory: client
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Linux
        working-directory: client
        run: flutter build linux --release

      - name: Create tar.gz
        run: |
          cd client/build/linux/x64/release/bundle
          tar czf $GITHUB_WORKSPACE/Clawke-linux-x64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: Clawke-linux-x64.tar.gz

  # ── Create GitHub Release ────────────────────────────────────
  release:
    needs: [build-android, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          TAG=${GITHUB_REF_NAME}
          mkdir -p release
          cp artifacts/android-apk/app-release.apk    "release/Clawke-${TAG}-android.apk"
          cp artifacts/macos-dmg/Clawke-macOS.dmg      "release/Clawke-${TAG}-macOS.dmg"
          cp artifacts/windows-zip/Clawke-windows-x64.zip "release/Clawke-${TAG}-windows-x64.zip"
          cp artifacts/linux-tar/Clawke-linux-x64.tar.gz  "release/Clawke-${TAG}-linux-x64.tar.gz"

      - name: Generate release notes
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ] || [ "$PREV_TAG" = "${GITHUB_REF_NAME}" ]; then
            # First release — use all commits
            git log --pretty=format:"- %s (%h)" -50 > RELEASE_NOTES.md
          else
            git log ${PREV_TAG}..${GITHUB_REF_NAME} --pretty=format:"- %s (%h)" > RELEASE_NOTES.md
          fi

          # Prepend download section
          TAG=${GITHUB_REF_NAME}
          cat > RELEASE_HEADER.md << 'EOF'
          ## Download

          | Platform | File | Install |
          |----------|------|---------|
          | 🍎 iOS | — | [App Store](https://apps.apple.com/app/clawke/id6744313782) |
          | 🖥 macOS | `Clawke-TAG-macOS.dmg` | Open DMG, drag to Applications |
          | 🤖 Android | `Clawke-TAG-android.apk` | Enable "Unknown sources", install APK |
          | 🪟 Windows | `Clawke-TAG-windows-x64.zip` | Unzip, run `clawke.exe` |
          | 🐧 Linux | `Clawke-TAG-linux-x64.tar.gz` | Extract, run `./clawke` |

          ## Server Setup
          ```bash
          cd server && npm install && npx clawke server start
          ```

          ## Changes
          EOF

          sed -i "s/TAG/${TAG}/g" RELEASE_HEADER.md
          # Remove leading spaces from heredoc
          sed -i 's/^          //' RELEASE_HEADER.md
          cat RELEASE_HEADER.md RELEASE_NOTES.md > FINAL_NOTES.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: FINAL_NOTES.md
          files: release/*
          overwrite_files: true
          draft: false
          prerelease: false
