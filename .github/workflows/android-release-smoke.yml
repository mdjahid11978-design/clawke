name: Android Release Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - codex/fix-android-1.1.21-google-login

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.41.4'

jobs:
  build-android-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Install dependencies
        working-directory: client
        run: flutter pub get

      - name: Generate code
        working-directory: client
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Restore Android Firebase config
        env:
          ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          test -n "$ANDROID_GOOGLE_SERVICES_JSON_BASE64"
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 -d > client/android/app/google-services.json

      - name: Restore Android release signing key
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_RELEASE_CERT_SHA256: ${{ secrets.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_RELEASE_CERT_SHA256"

          mkdir -p client/android/keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > client/android/keystore/clawke-release.jks
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=%s\n' '../keystore/clawke-release.jks'
          } > client/android/key.properties

          CERT_INFO="$(keytool -list -v \
            -keystore client/android/keystore/clawke-release.jks \
            -alias "$ANDROID_KEY_ALIAS" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD")"
          RELEASE_CERT_SHA1="$(printf '%s\n' "$CERT_INFO" | awk -F': ' '/SHA1:/ {print $2; exit}' | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          RELEASE_CERT_SHA256="$(printf '%s\n' "$CERT_INFO" | awk -F': ' '/SHA256:/ {print $2; exit}' | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          EXPECTED_SHA256="$(printf '%s' "$ANDROID_RELEASE_CERT_SHA256" | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          test -n "$RELEASE_CERT_SHA1"
          test -n "$RELEASE_CERT_SHA256"
          if [ "$RELEASE_CERT_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error::Android release keystore certificate SHA-256 does not match ANDROID_RELEASE_CERT_SHA256."
            echo "Actual SHA-256: $RELEASE_CERT_SHA256"
            exit 1
          fi
          echo "ANDROID_RELEASE_CERT_SHA1=$RELEASE_CERT_SHA1" >> "$GITHUB_ENV"

      - name: Verify Android Firebase OAuth config
        run: |
          test -n "$ANDROID_RELEASE_CERT_SHA1"
          node <<'NODE'
          const fs = require('node:fs');
          const expected = process.env.ANDROID_RELEASE_CERT_SHA1.replace(/[^a-fA-F0-9]/g, '').toLowerCase();
          const config = JSON.parse(fs.readFileSync('client/android/app/google-services.json', 'utf8'));
          const hashes = [];
          for (const client of config.client || []) {
            for (const oauthClient of client.oauth_client || []) {
              const hash = oauthClient.android_info?.certificate_hash;
              if (hash) hashes.push(hash.replace(/[^a-fA-F0-9]/g, '').toLowerCase());
            }
          }
          if (!hashes.includes(expected)) {
            console.error(`::error::Android google-services.json does not include the release certificate SHA-1 ${expected}.`);
            console.error(`Configured SHA-1 values: ${hashes.join(', ') || '(none)'}`);
            process.exit(1);
          }
          console.log(`Android Firebase OAuth SHA-1 verified: ${expected}`);
          NODE

      - name: Build APK
        working-directory: client
        run: flutter build apk --release

      - name: Verify Android release signing
        env:
          ANDROID_RELEASE_CERT_SHA256: ${{ secrets.ANDROID_RELEASE_CERT_SHA256 }}
        run: |
          test -n "$ANDROID_RELEASE_CERT_SHA256"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner | sort -V | tail -1)"
          test -x "$APKSIGNER"
          "$APKSIGNER" verify --print-certs client/build/app/outputs/flutter-apk/app-release.apk | tee apk-signing.txt
          if grep -q "CN=Android Debug" apk-signing.txt; then
            echo "::error::Android release APK was signed with the debug certificate."
            exit 1
          fi
          EXPECTED_SHA256="$(printf '%s' "$ANDROID_RELEASE_CERT_SHA256" | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          ACTUAL_SHA256="$(awk -F': ' '/certificate SHA-256 digest/ {print $NF; exit}' apk-signing.txt | tr -d '[:space:]:' | tr '[:upper:]' '[:lower:]')"
          test -n "$ACTUAL_SHA256"
          if [ "$ACTUAL_SHA256" != "$EXPECTED_SHA256" ]; then
            echo "::error::Android release APK certificate SHA-256 does not match the expected release certificate."
            echo "Actual SHA-256: $ACTUAL_SHA256"
            exit 1
          fi
          echo "Android release certificate SHA-256 verified: $ACTUAL_SHA256"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: android-release-smoke-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload signing report
        uses: actions/upload-artifact@v7
        with:
          name: android-release-smoke-signing
          path: apk-signing.txt

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          TAG="android-release-smoke-${GITHUB_RUN_ID}"
          mkdir -p release
          cp client/build/app/outputs/flutter-apk/app-release.apk "release/Clawke-${SHORT_SHA}-android.apk"
          cp apk-signing.txt "release/Clawke-${SHORT_SHA}-android-signing.txt"
          gh release create "$TAG" release/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --draft \
            --prerelease \
            --title "Android release smoke ${SHORT_SHA}" \
            --notes "Draft Android release smoke build for Google sign-in validation. Commit: ${GITHUB_SHA}"
