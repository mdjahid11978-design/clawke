<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clawke Skills 管理页面预览</title>
  <style>
    :root {
      --bg: #f5f7f4;
      --surface: #ffffff;
      --surface-soft: #eef3ef;
      --surface-strong: #dfe8e2;
      --line: #d7dfd9;
      --line-strong: #b7c5bd;
      --text: #14211b;
      --muted: #64736b;
      --faint: #87948d;
      --teal: #087f72;
      --teal-soft: #dcefeb;
      --blue: #2757c5;
      --blue-soft: #dfe7ff;
      --amber: #b76500;
      --amber-soft: #fff1d6;
      --red: #bd3829;
      --red-soft: #ffe1dc;
      --shadow: 0 18px 48px rgba(19, 31, 25, 0.08);
      --radius: 8px;
      --nav: 92px;
      --list: 360px;
      color-scheme: light;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(8, 127, 114, 0.08), transparent 36%),
        linear-gradient(180deg, #fbfcfb 0%, var(--bg) 100%);
      color: var(--text);
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--nav) 1fr;
    }

    .nav {
      background: #10201a;
      color: #dce8e2;
      border-right: 1px solid rgba(255, 255, 255, 0.08);
      padding: 14px 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .avatar {
      width: 38px;
      height: 38px;
      margin: 0 auto 12px;
      border-radius: 8px;
      background: linear-gradient(135deg, #e9fff8, #77d5c7);
      color: #0d3028;
      display: grid;
      place-items: center;
      font-weight: 800;
    }

    .nav-item {
      min-height: 50px;
      border-radius: var(--radius);
      color: #adbbb4;
      display: grid;
      place-items: center;
      gap: 3px;
      background: transparent;
      transition: background 140ms ease, color 140ms ease;
    }

    .nav-item svg {
      width: 20px;
      height: 20px;
      stroke-width: 2;
    }

    .nav-item span {
      font-size: 12px;
      line-height: 1.1;
      white-space: nowrap;
    }

    .nav-item.active {
      color: #ffffff;
      background: rgba(115, 213, 198, 0.18);
      box-shadow: inset 0 0 0 1px rgba(115, 213, 198, 0.24);
    }

    .nav-spacer {
      flex: 1;
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      min-height: 74px;
      padding: 16px 24px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(18px);
      position: sticky;
      top: 0;
      z-index: 3;
    }

    .title-block {
      min-width: 0;
    }

    .title-block h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 760;
      letter-spacing: 0;
    }

    .title-block p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-btn,
    .primary-btn,
    .danger-btn,
    .ghost-btn {
      height: 38px;
      border-radius: var(--radius);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .icon-btn svg,
    .primary-btn svg,
    .danger-btn svg,
    .ghost-btn svg {
      width: 17px;
      height: 17px;
      stroke-width: 2.2;
      flex: 0 0 auto;
    }

    .icon-btn {
      width: 38px;
      padding: 0;
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--line);
    }

    .ghost-btn {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .primary-btn {
      background: var(--teal);
      color: #ffffff;
      box-shadow: 0 10px 24px rgba(8, 127, 114, 0.2);
    }

    .danger-btn {
      background: var(--red-soft);
      color: var(--red);
      border: 1px solid rgba(189, 56, 41, 0.18);
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: var(--list) minmax(0, 1fr);
    }

    .list-pane {
      min-width: 0;
      border-right: 1px solid var(--line);
      background: rgba(250, 252, 250, 0.72);
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: calc(100vh - 74px);
    }

    .filters {
      padding: 18px 18px 12px;
      display: grid;
      gap: 12px;
    }

    .search {
      height: 42px;
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
    }

    .search svg {
      width: 17px;
      height: 17px;
      color: var(--faint);
      flex: 0 0 auto;
    }

    .search input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      color: var(--text);
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .segmented button {
      min-width: 0;
      height: 30px;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
    }

    .segmented button.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 4px rgba(19, 31, 25, 0.08);
    }

    .source-filter {
      height: 38px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      padding: 0 10px;
      outline: 0;
      width: 100%;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 0 18px 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 10px;
      min-width: 0;
    }

    .metric strong {
      display: block;
      font-size: 18px;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .skill-list {
      overflow: auto;
      padding: 0 12px 18px;
    }

    .skill-item {
      width: 100%;
      text-align: left;
      border-radius: var(--radius);
      background: transparent;
      color: var(--text);
      padding: 12px;
      border: 1px solid transparent;
      display: grid;
      gap: 8px;
      transition: background 140ms ease, border 140ms ease;
    }

    .skill-item + .skill-item {
      margin-top: 6px;
    }

    .skill-item.active {
      background: var(--surface);
      border-color: var(--line-strong);
      box-shadow: var(--shadow);
    }

    .skill-head {
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      flex: 0 0 auto;
    }

    .status-dot.disabled {
      background: var(--faint);
    }

    .skill-name {
      min-width: 0;
      font-weight: 760;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .skill-desc {
      color: var(--muted);
      line-height: 1.42;
      font-size: 13px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      height: 24px;
      padding: 0 8px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      max-width: 100%;
    }

    .chip.managed {
      color: var(--teal);
      background: var(--teal-soft);
    }

    .chip.external {
      color: var(--blue);
      background: var(--blue-soft);
    }

    .chip.readonly {
      color: var(--amber);
      background: var(--amber-soft);
    }

    .detail-pane {
      min-width: 0;
      min-height: calc(100vh - 74px);
      padding: 24px;
      overflow: auto;
    }

    .detail-shell {
      max-width: 1080px;
      margin: 0 auto;
      display: grid;
      gap: 18px;
    }

    .detail-header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
    }

    .detail-title {
      min-width: 0;
    }

    .detail-title h2 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .detail-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      max-width: 760px;
    }

    .detail-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .notice {
      min-height: 42px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface);
      padding: 11px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .notice svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
      color: var(--teal);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 760;
    }

    .field input,
    .field textarea {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      outline: 0;
      padding: 10px 11px;
      width: 100%;
      min-width: 0;
    }

    .field input {
      height: 40px;
    }

    .field textarea {
      min-height: 250px;
      resize: vertical;
      line-height: 1.5;
      font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", Menlo, monospace;
      font-size: 13px;
    }

    .field input:disabled,
    .field textarea:disabled {
      color: var(--faint);
      background: #f7f9f7;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: var(--surface);
    }

    .switch-row strong {
      display: block;
      font-size: 14px;
    }

    .switch-row span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .switch {
      width: 46px;
      height: 26px;
      border-radius: 999px;
      background: var(--line-strong);
      padding: 3px;
      flex: 0 0 auto;
      transition: background 140ms ease;
    }

    .switch::after {
      content: "";
      display: block;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      transition: transform 140ms ease;
    }

    .switch.on {
      background: var(--teal);
    }

    .switch.on::after {
      transform: translateX(20px);
    }

    .preview {
      border: 1px solid var(--line);
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .preview-head {
      height: 40px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    pre {
      margin: 0;
      padding: 14px;
      overflow: auto;
      color: #203329;
      font-size: 12.5px;
      line-height: 1.55;
      font-family: ui-monospace, "SFMono-Regular", "Cascadia Code", Menlo, monospace;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .empty {
      min-height: 360px;
      display: grid;
      place-items: center;
      color: var(--muted);
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.62);
      text-align: center;
      padding: 28px;
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      background: #12251e;
      color: #ffffff;
      border-radius: var(--radius);
      padding: 11px 14px;
      box-shadow: var(--shadow);
      transform: translateY(20px);
      opacity: 0;
      pointer-events: none;
      transition: transform 160ms ease, opacity 160ms ease;
      z-index: 10;
      font-weight: 700;
      max-width: calc(100vw - 48px);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    @media (max-width: 920px) {
      .app {
        grid-template-columns: 1fr;
      }

      .nav {
        position: sticky;
        top: 0;
        z-index: 5;
        height: auto;
        flex-direction: row;
        align-items: center;
        padding: 8px;
        overflow-x: auto;
      }

      .avatar {
        margin: 0 4px 0 0;
        flex: 0 0 auto;
      }

      .nav-item {
        min-width: 78px;
        min-height: 42px;
      }

      .nav-spacer {
        display: none;
      }

      .topbar {
        top: 58px;
        padding: 14px;
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions {
        width: 100%;
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .list-pane {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .skill-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 8px;
      }

      .skill-item + .skill-item {
        margin-top: 0;
      }

      .detail-pane {
        min-height: auto;
        padding: 16px;
      }

      .detail-header {
        flex-direction: column;
      }

      .detail-actions {
        justify-content: flex-start;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .summary-row {
        grid-template-columns: 1fr;
      }

      .segmented {
        grid-template-columns: 1fr;
      }

      .top-actions .ghost-btn,
      .top-actions .primary-btn {
        flex: 1 1 auto;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="nav" aria-label="主导航">
      <div class="avatar">C</div>
      <button class="nav-item" type="button" aria-label="会话">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 15a4 4 0 0 1-4 4H8l-5 3V7a4 4 0 0 1 4-4h10a4 4 0 0 1 4 4z"></path></svg>
        <span>会话</span>
      </button>
      <button class="nav-item" type="button" aria-label="仪表盘">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 13a8 8 0 1 1 16 0"></path><path d="M12 13l4-4"></path><path d="M7 20h10"></path></svg>
        <span>仪表盘</span>
      </button>
      <button class="nav-item active" type="button" aria-label="技能中心">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v6"></path><path d="M12 16v6"></path><path d="M4.93 4.93l4.24 4.24"></path><path d="M14.83 14.83l4.24 4.24"></path><path d="M2 12h6"></path><path d="M16 12h6"></path><path d="M4.93 19.07l4.24-4.24"></path><path d="M14.83 9.17l4.24-4.24"></path><circle cx="12" cy="12" r="3"></circle></svg>
        <span>技能中心</span>
      </button>
      <div class="nav-spacer"></div>
      <button class="nav-item" type="button" aria-label="设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"></path><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.4 1.08V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 8.6 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 0-1.08-.4H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 8.6a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 0 .4-1.08V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15.4 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.39.15.74.37 1 .6.29.29.46.67.46 1.08V11a2 2 0 1 1 0 4h-.09c-.41 0-.79.17-1.08.46-.23.26-.45.61-.6 1z"></path></svg>
        <span>设置</span>
      </button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="title-block">
          <h1>技能中心</h1>
          <p>管理本机 Clawke Server 可发现的 Skills，创建、编辑、禁用和清理可管理技能。</p>
        </div>
        <div class="top-actions">
          <button class="icon-btn" type="button" id="refreshBtn" title="刷新">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12a9 9 0 0 1-15.36 6.36"></path><path d="M3 12A9 9 0 0 1 18.36 5.64"></path><path d="M18 2v4h4"></path><path d="M6 22v-4H2"></path></svg>
          </button>
          <button class="primary-btn" type="button" id="newBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
            新建技能
          </button>
        </div>
      </header>

      <section class="workspace">
        <aside class="list-pane">
          <div class="filters">
            <label class="search" for="searchInput">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="11" cy="11" r="7"></circle><path d="M20 20l-3.5-3.5"></path></svg>
              <input id="searchInput" type="search" placeholder="搜索名称、描述、分类或 trigger">
            </label>
            <div class="segmented" role="group" aria-label="状态过滤">
              <button type="button" data-status="all" class="active">全部</button>
              <button type="button" data-status="enabled">启用</button>
              <button type="button" data-status="disabled">禁用</button>
            </div>
            <select class="source-filter" id="sourceFilter" aria-label="来源过滤">
              <option value="all">全部来源</option>
              <option value="managed">可管理</option>
              <option value="external">外部</option>
              <option value="readonly">只读</option>
            </select>
          </div>

          <div class="summary-row">
            <div class="metric">
              <strong id="totalMetric">0</strong>
              <span>技能总数</span>
            </div>
            <div class="metric">
              <strong id="enabledMetric">0</strong>
              <span>已启用</span>
            </div>
            <div class="metric">
              <strong id="managedMetric">0</strong>
              <span>可管理</span>
            </div>
          </div>

          <div class="skill-list" id="skillList"></div>
        </aside>

        <section class="detail-pane">
          <div class="detail-shell" id="detailShell"></div>
        </section>
      </section>
    </main>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const skills = [
      {
        id: "general/web-search",
        name: "web-search",
        category: "general",
        trigger: "search",
        description: "联网搜索、资料摘取和来源整理。",
        source: "managed",
        sourceLabel: "Clawke managed",
        enabled: true,
        writable: true,
        deletable: true,

    const state = {
      selectedId: skills[0].id,
      query: "",
      status: "all",
      source: "all",
      draft: null,
      dirty: false
    };

    const listEl = document.getElementById("skillList");
    const detailEl = document.getElementById("detailShell");
    const searchInput = document.getElementById("searchInput");
    const sourceFilter = document.getElementById("sourceFilter");
    const toast = document.getElementById("toast");

    function icon(name) {
      const icons = {
        save: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><path d="M17 21v-8H7v8"></path><path d="M7 3v5h8"></path></svg>',
        trash: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></svg>',
        x: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 6L6 18"></path><path d="M6 6l12 12"></path></svg>',
        alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 9v4"></path><path d="M12 17h.01"></path><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>'
      };
      return icons[name] || "";
    }

    function getSelected() {
      if (state.draft) return state.draft;
      return skills.find((skill) => skill.id === state.selectedId) || skills[0];
    }

    function filteredSkills() {
      const q = state.query.trim().toLowerCase();
      return skills.filter((skill) => {
        const matchesQuery = !q || [skill.name, skill.description, skill.category, skill.trigger].some((value) => String(value || "").toLowerCase().includes(q));
        const matchesStatus = state.status === "all" || (state.status === "enabled" ? skill.enabled : !skill.enabled);
        const matchesSource = state.source === "all" || skill.source === state.source;
        return matchesQuery && matchesStatus && matchesSource;
      });
    }

    function sourceLabel(skill) {
      const className = skill.source;
      const text = skill.source === "managed" ? "可管理" : skill.source === "external" ? "外部" : "只读";
      return `<span class="chip ${className}">${text}</span>`;
    }

    function renderMetrics() {
      document.getElementById("totalMetric").textContent = skills.length;
      document.getElementById("enabledMetric").textContent = skills.filter((skill) => skill.enabled).length;
      document.getElementById("managedMetric").textContent = skills.filter((skill) => skill.source === "managed").length;
    }

    function renderList() {
      const items = filteredSkills();
      if (!items.length) {
        listEl.innerHTML = '<div class="empty">没有匹配的技能</div>';
        return;
      }
      listEl.innerHTML = items.map((skill) => `
        <button class="skill-item ${skill.id === state.selectedId && !state.draft ? "active" : ""}" type="button" data-id="${skill.id}">
          <div class="skill-head">
            <span class="status-dot ${skill.enabled ? "" : "disabled"}"></span>
            <span class="skill-name">${skill.name}</span>
          </div>
          <div class="skill-desc">${skill.description}</div>
          <div class="chips">
            <span class="chip">${skill.category}</span>
            ${sourceLabel(skill)}
            <span class="chip">${skill.enabled ? "启用" : "禁用"}</span>
          </div>
        </button>
      `).join("");
      document.querySelectorAll(".skill-item").forEach((button) => {
        button.addEventListener("click", () => selectSkill(button.dataset.id));
      });
    }

    function makeContent(skill) {
      return `---\nname: ${skill.name}\ndescription: ${skill.description}\ntrigger: ${skill.trigger || ""}\ncategory: ${skill.category}\n---\n\n# ${skill.name}\n\n${skill.body}`;
    }

    function renderDetail() {
      const skill = getSelected();
      if (!skill) {
        detailEl.innerHTML = '<div class="empty">选择一个技能开始查看</div>';
        return;
      }
      const readonly = !skill.writable;
      const sourceHint = readonly
        ? "该技能来自只读来源，可以查看和禁用，不能编辑或删除。"
        : skill.deletable
          ? "该技能位于 Clawke managed root，可编辑、禁用和删除。"
          : "该技能来自外部目录，可编辑但不默认允许删除。";
      detailEl.innerHTML = `
        <div class="detail-header">
          <div class="detail-title">
            <h2>${state.draft ? "新建技能" : skill.name}</h2>
            <p>${skill.path}</p>
          </div>
          <div class="detail-actions">
            <button class="ghost-btn" type="button" id="cancelBtn">${icon("x")}取消</button>
            <button class="primary-btn" type="button" id="saveBtn" ${readonly ? "disabled" : ""}>${icon("save")}保存</button>
            ${skill.deletable ? `<button class="danger-btn" type="button" id="deleteBtn">${icon("trash")}删除</button>` : ""}
          </div>
        </div>
        <div class="notice">${icon("alert")}<span>${sourceHint}</span></div>
        <div class="switch-row">
          <div>
            <strong>${skill.enabled ? "已启用" : "已禁用"}</strong>
            <span>禁用后不会出现在会话配置的可选 Skills 中。</span>
          </div>
          <button class="switch ${skill.enabled ? "on" : ""}" id="toggleBtn" type="button" aria-label="切换启用状态"></button>
        </div>
        <div class="form-grid">
          <div class="field">
            <label for="nameInput">名称</label>
            <input id="nameInput" value="${escapeAttr(skill.name)}" ${readonly ? "disabled" : ""}>
          </div>
          <div class="field">
            <label for="categoryInput">分类</label>
            <input id="categoryInput" value="${escapeAttr(skill.category)}" ${readonly ? "disabled" : ""}>
          </div>
          <div class="field">
            <label for="triggerInput">Trigger</label>
            <input id="triggerInput" value="${escapeAttr(skill.trigger || "")}" ${readonly ? "disabled" : ""}>
          </div>
          <div class="field">
            <label for="descriptionInput">描述</label>
            <input id="descriptionInput" value="${escapeAttr(skill.description)}" ${readonly ? "disabled" : ""}>
          </div>
          <div class="field full">
            <label for="bodyInput">Markdown 正文</label>
            <textarea id="bodyInput" ${readonly ? "disabled" : ""}>${escapeHtml(skill.body)}</textarea>
          </div>
        </div>
        <div class="preview">
          <div class="preview-head">
            <span>SKILL.md 预览</span>
            <span>${skill.updatedAt}</span>
          </div>
          <pre id="contentPreview">${escapeHtml(makeContent(skill))}</pre>
        </div>
      `;
      bindDetailEvents(skill);
    }

    function bindDetailEvents(skill) {
      const inputs = ["nameInput", "categoryInput", "triggerInput", "descriptionInput", "bodyInput"].map((id) => document.getElementById(id)).filter(Boolean);
      inputs.forEach((input) => {
        input.addEventListener("input", () => {
          state.dirty = true;
          updatePreview(skill);
        });
      });
      document.getElementById("toggleBtn").addEventListener("click", () => {
        skill.enabled = !skill.enabled;
        state.dirty = false;
        renderAll();
        showToast(skill.enabled ? "技能已启用" : "技能已禁用");
      });
      const saveBtn = document.getElementById("saveBtn");
      saveBtn.addEventListener("click", saveCurrent);
      document.getElementById("cancelBtn").addEventListener("click", () => {
        state.draft = null;
        state.dirty = false;
        renderAll();
      });
      const deleteBtn = document.getElementById("deleteBtn");
      if (deleteBtn) {
        deleteBtn.addEventListener("click", deleteCurrent);
      }
    }

    function readForm(base) {
      return {
        ...base,
        name: document.getElementById("nameInput").value.trim(),
        category: document.getElementById("categoryInput").value.trim() || "general",
        trigger: document.getElementById("triggerInput").value.trim(),
        description: document.getElementById("descriptionInput").value.trim(),
        body: document.getElementById("bodyInput").value
      };
    }

    function updatePreview(skill) {
      const next = readForm(skill);
      document.getElementById("contentPreview").textContent = makeContent(next);
    }

    function selectSkill(id) {
      if (state.dirty && !confirm("当前编辑尚未保存，确认切换吗？")) return;
      state.selectedId = id;
      state.draft = null;
      state.dirty = false;
      renderAll();
    }

    function saveCurrent() {
      const current = getSelected();
      const next = readForm(current);
      if (!next.name || !next.description) {
        showToast("名称和描述不能为空");
        return;
      }
      next.id = `${next.category}/${next.name}`;
      next.updatedAt = "刚刚";
      if (state.draft) {
        if (skills.some((skill) => skill.id === next.id)) {
          showToast("同名技能已存在");
          return;
        }
        skills.unshift(next);
        state.selectedId = next.id;
        state.draft = null;
      } else {
        const index = skills.findIndex((skill) => skill.id === current.id);
        skills[index] = next;
        state.selectedId = next.id;
      }
      state.dirty = false;
      renderAll();
      showToast("技能已保存");
    }

    function deleteCurrent() {
      const skill = getSelected();
      if (!skill.deletable) return;
      if (!confirm(`确认删除 ${skill.name} 吗？`)) return;
      const index = skills.findIndex((item) => item.id === skill.id);
      if (index >= 0) skills.splice(index, 1);
      state.selectedId = skills[0] ? skills[0].id : null;
      state.draft = null;
      state.dirty = false;
      renderAll();
      showToast("技能已删除");
    }

    function newSkill() {
      if (state.dirty && !confirm("当前编辑尚未保存，确认新建吗？")) return;
      state.draft = {
        id: "general/new-skill",
        name: "new-skill",
        category: "general",
        trigger: "",
        description: "描述这个技能适合何时使用。",
        source: "managed",
        sourceLabel: "Clawke managed",
        enabled: true,
        writable: true,
        deletable: true,
        updatedAt: "未保存",
        path: "~/.clawke/skills/general/new-skill/SKILL.md",
        body: "## Purpose\n\nDescribe when this skill should be used.\n\n## Workflow\n\n1. Inspect the user's request.\n2. Apply the relevant project context.\n3. Produce the expected output."
      };
      state.dirty = true;
      renderAll();
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#096;");
    }

    function renderAll() {
      renderMetrics();
      renderList();
      renderDetail();
    }

    searchInput.addEventListener("input", (event) => {
      state.query = event.target.value;
      renderList();
    });

    sourceFilter.addEventListener("change", (event) => {
      state.source = event.target.value;
      renderList();
    });

    document.querySelectorAll("[data-status]").forEach((button) => {
      button.addEventListener("click", () => {
        document.querySelectorAll("[data-status]").forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        state.status = button.dataset.status;
        renderList();
      });
    });

    document.getElementById("newBtn").addEventListener("click", newSkill);
    document.getElementById("refreshBtn").addEventListener("click", () => showToast("已刷新技能列表"));

    renderAll();
  </script>
</body>
