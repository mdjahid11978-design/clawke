<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clawke 移动端预览</title>
  <style>
    :root {
      --bg: #0f1110;
      --surface: #171a18;
      --surface-2: #202421;
      --line: #333a36;
      --text: #eef2ef;
      --muted: #b7c0ba;
      --green: #10c893;
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 16% 0%, rgba(16, 200, 147, .16), transparent 32%),
        linear-gradient(180deg, #151916, var(--bg));
    }

    .page {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: 28px 24px 40px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.12;
      font-weight: 920;
      letter-spacing: 0;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      font-weight: 640;
      line-height: 1.45;
    }

    .viewport-note {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: rgba(23, 26, 24, .72);
      color: #d7e2dc;
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .phones {
      display: grid;
      grid-template-columns: repeat(2, minmax(390px, 1fr));
      gap: 22px;
      align-items: start;
    }

    .phone-card {
      min-width: 0;
    }

    .phone-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 10px;
      color: #dfe7e2;
      font-size: 16px;
      font-weight: 860;
    }

    .phone-title span:last-child {
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    .phone {
      width: 390px;
      height: 844px;
      max-width: 100%;
      margin: 0 auto;
      padding: 12px;
      border: 1px solid #3a433e;
      border-radius: 34px;
      background:
        linear-gradient(180deg, #252b27, #111412);
      box-shadow:
        0 28px 80px rgba(0, 0, 0, .42),
        inset 0 0 0 1px rgba(255, 255, 255, .04);
    }

    .screen {
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid #252c28;
      border-radius: 24px;
      background: #0f1110;
    }

    iframe {
      width: 390px;
      height: 844px;
      border: 0;
      transform-origin: 0 0;
      background: #0f1110;
    }

    @media (max-width: 900px) {
      .phones {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 460px) {
      .page {
        padding: 18px 12px 28px;
      }

      header {
        display: block;
      }

      .viewport-note {
        margin-top: 12px;
      }

      .phone {
        width: 100%;
        height: 780px;
        padding: 8px;
        border-radius: 28px;
      }

      iframe {
        width: 390px;
        height: 780px;
        transform: scale(calc((100vw - 42px) / 390));
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div>
        <h1>移动端预览</h1>
        <p>同一套布局规范下，技能中心和任务管理在 390px 手机宽度的实际响应式效果。</p>
      </div>
      <div class="viewport-note">Viewport 390 × 844</div>
    </header>

    <section class="phones">
      <article class="phone-card">
        <h2 class="phone-title">
          <span>技能中心</span>
          <span>skill-center-ui-demo.html</span>
        </h2>
        <div class="phone">
          <div class="screen">
            <iframe src="skill-center-ui-demo.html" title="技能中心移动端预览"></iframe>
          </div>
        </div>
      </article>

      <article class="phone-card">
        <h2 class="phone-title">
          <span>任务管理</span>
          <span>task-management-ui-demo.html</span>
        </h2>
        <div class="phone">
          <div class="screen">
            <iframe src="task-management-ui-demo.html" title="任务管理移动端预览"></iframe>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
