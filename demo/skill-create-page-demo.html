<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clawke 新建技能页 Demo</title>
  <style>
    :root {
      --bg: #121413;
      --surface-2: #101211;
      --card: #191c1a;
      --field: #111412;
      --line: rgba(224, 233, 226, .16);
      --line-strong: rgba(224, 233, 226, .25);
      --text: #eef3ef;
      --text-soft: #ccd6d0;
      --muted: #9ca8a1;
      --faint: #737d77;
      --green: #18c58f;
      --green-dim: rgba(24, 197, 143, .13);
      --green-line: rgba(24, 197, 143, .28);
      --font: "Avenir Next", "SF Pro Rounded", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: var(--bg); }
    body { margin: 0; min-height: 100vh; color: var(--text); background: var(--bg); font-family: var(--font); letter-spacing: -.01em; }
    button, input, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }

    .material-appbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 64px;
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) 128px;
      align-items: center;
      background: var(--bg);
      border-bottom: 1px solid rgba(224, 233, 226, .08);
    }

    .back-icon {
      width: 64px;
      height: 64px;
      display: inline-grid;
      place-items: center;
      color: var(--text);
      background: transparent;
    }

    .back-icon:hover { color: var(--green); }
    .back-icon svg { width: 30px; height: 30px; stroke-width: 2.8; }

    .appbar-title {
      margin: 0;
      justify-self: center;
      color: var(--text);
      font-size: 18px;
      line-height: 1.15;
      font-weight: 850;
      letter-spacing: -.02em;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .appbar-action {
      justify-self: end;
      margin-right: 18px;
      min-width: 78px;
      height: 44px;
      padding: 0 6px;
      color: var(--green);
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      font-size: 15px;
      font-weight: 850;
    }

    .appbar-action svg { width: 19px; height: 19px; stroke-width: 2.35; flex: 0 0 auto; }
    .appbar-action:disabled { color: var(--faint); cursor: not-allowed; }

    .content { padding: 28px 24px 38px; }
    .layout { max-width: 1180px; }


    .panel {
      border: 1px solid var(--line-strong);
      background: var(--card);
      border-radius: 10px;
      padding: 24px;
    }

    .panel + .panel { margin-top: 16px; }

    .panel h2 {
      margin: 0 0 18px;
      color: var(--text);
      font-size: 21px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: -.025em;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.1fr .75fr .95fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .field { min-width: 0; }

    label {
      display: block;
      margin: 0 0 8px;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 850;
    }

    input,
    textarea {
      width: 100%;
      color: var(--text);
      background: var(--field);
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      outline: none;
      transition: 150ms ease;
    }

    input { height: 48px; padding: 0 14px; font-size: 16px; font-weight: 720; }
    textarea { padding: 14px; min-height: 104px; resize: vertical; font-size: 16px; line-height: 1.55; font-weight: 640; }

    input::placeholder,
    textarea::placeholder { color: var(--faint); }

    .markdown-editor {
      min-height: 440px;
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.7;
    }

    input:focus,
    textarea:focus {
      border-color: var(--green-line);
      box-shadow: 0 0 0 3px rgba(24, 197, 143, .09);
    }

    .helper {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      font-weight: 700;
    }

    .create-path {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 9px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 750;
    }

    .create-path strong { color: var(--text-soft); font-family: var(--mono); font-weight: 760; }

    .template-note {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 720;
    }

    @media (max-width: 1100px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
      .field.trigger { grid-column: 1 / -1; }
    }

    @media (max-width: 760px) {
      .material-appbar { height: 56px; grid-template-columns: 88px minmax(0, 1fr) 88px; }
      .back-icon { width: 56px; height: 56px; }
      .back-icon svg { width: 28px; height: 28px; }
      .appbar-title { font-size: 17px; }
      .appbar-action { width: 88px; min-width: 88px; height: 56px; margin-right: 0; padding: 0 10px 0 0; justify-content: flex-end; }
      .content { padding: 22px 12px 28px; }
      .form-grid { grid-template-columns: 1fr; }
      .panel { padding: 18px; }
      .markdown-editor { min-height: 360px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="material-appbar" aria-label="新建技能 AppBar">
      <button class="back-icon" aria-label="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1 class="appbar-title">新建技能</h1>
      <button class="appbar-action" aria-label="创建">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
        <span>创建</span>
      </button>
    </header>

    <main class="content">
      <section class="layout">

        <article class="panel">
          <h2>基础信息</h2>
          <div class="form-grid">
            <div class="field">
              <label for="name">名称</label>
              <input id="name" value="" placeholder="my-skill" autocomplete="off">
              <p class="helper">必填。将作为技能目录名，例如 <strong>my-skill</strong>。</p>
            </div>
            <div class="field">
              <label for="category">分类</label>
              <input id="category" value="general" autocomplete="off">
              <p class="helper">默认 general，用于筛选和展示。</p>
            </div>
            <div class="field trigger">
              <label for="trigger">触发说明</label>
              <input id="trigger" value="" placeholder="Use when..." autocomplete="off">
              <p class="helper">可选。说明 Agent 什么时候应该启用这个技能。</p>
            </div>
          </div>

          <div class="field">
            <label for="description">描述</label>
            <textarea id="description" placeholder="一句话说明这个技能做什么、什么时候使用。"></textarea>
          </div>

          <div class="create-path">创建后路径：<strong>~/.agents/skills/&lt;name&gt;/SKILL.md</strong></div>
        </article>

        <article class="panel">
          <h2>SKILL.md 正文</h2>
          <p class="template-note">默认模板保留必要结构，保存时生成 SKILL.md。</p>
          <textarea class="markdown-editor" spellcheck="false">## Purpose

Describe what this skill does and when to use it.

## Use When

- Users ask to ...
- The task requires ...

## Workflow

1. Confirm the user's goal.
2. Gather required inputs.
3. Execute the skill-specific steps.
4. Return concise results.

## Guardrails

- Do not expose secrets.
- Ask before destructive operations.</textarea>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
