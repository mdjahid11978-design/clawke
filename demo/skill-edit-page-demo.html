<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Clawke 技能编辑页 Demo</title>
  <style>
    :root {
      --bg: #121413;
      --surface: #171a18;
      --surface-2: #101211;
      --card: #191c1a;
      --field: #111412;
      --line: rgba(224, 233, 226, .16);
      --line-strong: rgba(224, 233, 226, .25);
      --text: #eef3ef;
      --text-soft: #ccd6d0;
      --muted: #9ca8a1;
      --faint: #737d77;
      --green: #18c58f;
      --green-dim: rgba(24, 197, 143, .13);
      --green-line: rgba(24, 197, 143, .28);
      --amber: #ffbf72;
      --red: #ff7478;
      --font: "Avenir Next", "SF Pro Rounded", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: var(--bg); }
    body { margin: 0; min-height: 100vh; color: var(--text); background: var(--bg); font-family: var(--font); letter-spacing: -.01em; }
    button, input, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }

    .material-appbar {
      position: sticky;
      top: 0;
      z-index: 20;
      height: 64px;
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr) 128px;
      align-items: center;
      background: var(--bg);
      border-bottom: 1px solid rgba(224, 233, 226, .08);
    }

    .back-icon {
      width: 64px;
      height: 64px;
      display: inline-grid;
      place-items: center;
      color: var(--text);
      background: transparent;
    }

    .back-icon:hover { color: var(--green); }
    .back-icon svg { width: 30px; height: 30px; stroke-width: 2.8; }

    .appbar-title {
      margin: 0;
      justify-self: center;
      color: var(--text);
      font-size: 18px;
      line-height: 1.15;
      font-weight: 850;
      letter-spacing: -.02em;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .appbar-action {
      justify-self: end;
      margin-right: 18px;
      min-width: 78px;
      height: 44px;
      padding: 0 6px;
      color: var(--green);
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      font-size: 15px;
      font-weight: 850;
    }

    .appbar-action svg { width: 19px; height: 19px; stroke-width: 2.35; flex: 0 0 auto; }
    .appbar-action:disabled { color: var(--faint); cursor: not-allowed; }

    .content { padding: 28px 24px 38px; }


    .panel {
      border: 1px solid var(--line-strong);
      background: var(--card);
      border-radius: 10px;
      padding: 24px;
    }

    .panel + .panel { margin-top: 16px; }

    .panel h2,
    .panel h3 {
      margin: 0 0 18px;
      color: var(--text);
      font-size: 21px;
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: -.025em;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1.1fr .75fr .95fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .field { min-width: 0; }

    label {
      display: block;
      margin: 0 0 8px;
      color: var(--text-soft);
      font-size: 13px;
      font-weight: 850;
    }

    input,
    textarea {
      width: 100%;
      color: var(--text);
      background: var(--field);
      border: 1px solid var(--line-strong);
      border-radius: 9px;
      outline: none;
      transition: 150ms ease;
    }

    input { height: 48px; padding: 0 14px; font-size: 16px; font-weight: 720; }
    textarea { padding: 14px; min-height: 104px; resize: vertical; font-size: 16px; line-height: 1.55; font-weight: 640; }

    .markdown-editor {
      min-height: 440px;
      font-family: var(--mono);
      font-size: 15px;
      line-height: 1.7;
    }

    input:focus,
    textarea:focus {
      border-color: var(--green-line);
      box-shadow: 0 0 0 3px rgba(24, 197, 143, .09);
    }

    .helper {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      font-weight: 700;
    }

    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 14px;
    }

    .mini-actions { display: inline-flex; gap: 8px; flex-wrap: wrap; }

    .mini-btn {
      height: 32px;
      padding: 0 11px;
      border-radius: 999px;
      color: var(--green);
      background: rgba(255, 255, 255, .045);
      border: 1px solid var(--line);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 850;
    }

    .mini-btn svg { width: 14px; height: 14px; stroke-width: 2.4; }


    .bottom-actions {
      display: none;
      position: sticky;
      bottom: 0;
      margin: 18px -12px -28px;
      padding: 12px;
      background: linear-gradient(180deg, rgba(18,20,19,0), var(--bg) 32%);
    }

    .bottom-save {
      width: 100%;
      height: 48px;
      border-radius: 999px;
      color: #071911;
      background: var(--green);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 900;
    }

    .bottom-save svg { width: 19px; height: 19px; stroke-width: 2.4; }

    @media (max-width: 1100px) {
      .form-grid { grid-template-columns: 1fr 1fr; }
      .field.trigger { grid-column: 1 / -1; }
    }

    @media (max-width: 760px) {
      .material-appbar { height: 56px; grid-template-columns: 56px minmax(0, 1fr) 56px; }
      .back-icon { width: 56px; height: 56px; }
      .back-icon svg { width: 28px; height: 28px; }
      .appbar-title { font-size: 17px; }
      .appbar-action { width: 56px; min-width: 56px; height: 56px; margin-right: 0; padding: 0; justify-content: center; }
      .appbar-action span { display: none; }
      .content { padding: 22px 12px 28px; }
      .form-grid { grid-template-columns: 1fr; }
      .panel { padding: 18px; }
      .editor-head { align-items: flex-start; flex-direction: column; }
      .markdown-editor { min-height: 360px; font-size: 14px; }
      .bottom-actions { display: block; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="material-appbar" aria-label="技能编辑 AppBar">
      <button class="back-icon" aria-label="返回">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <h1 class="appbar-title">编辑技能</h1>
      <button class="appbar-action" aria-label="保存">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
        <span>保存</span>
      </button>
    </header>

    <main class="content">

      <section class="layout">
        <div>
          <article class="panel">
            <h2>基础信息</h2>
            <div class="form-grid">
              <div class="field">
                <label for="name">名称</label>
                <input id="name" value="algorithmic-art" autocomplete="off">
                <p class="helper">用于生成技能目录名，只允许字母、数字、点、下划线和短横线。</p>
              </div>
              <div class="field">
                <label for="category">分类</label>
                <input id="category" value="general" autocomplete="off">
                <p class="helper">当前一层目录规范下保留为元数据，便于筛选。</p>
              </div>
              <div class="field trigger">
                <label for="trigger">触发说明</label>
                <input id="trigger" value="Use when users request generative art" autocomplete="off">
                <p class="helper">可选。用于说明 Agent 什么时候应该启用这个技能。</p>
              </div>
            </div>

            <div class="field">
              <label for="description">描述</label>
              <textarea id="description">使用 p5.js 创建算法艺术，结合种子随机性和交互式参数探索。当用户请求使用代码创建艺术、生成艺术、算法艺术、流场或粒子系统时使用此技能。</textarea>
            </div>
          </article>

          <article class="panel">
            <div class="editor-head">
              <h2>SKILL.md 正文</h2>
              <div class="mini-actions" aria-label="编辑辅助操作">
                <button class="mini-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 7h16M4 12h16M4 17h10"/></svg>格式化</button>
                <button class="mini-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="m9 18 6-6-6-6"/></svg>预览</button>
              </div>
            </div>
            <textarea class="markdown-editor" spellcheck="false">## Purpose

Creating algorithmic art using p5.js with seeded randomness and interactive parameter exploration.

## Use When

- Users request creating art using code.
- Users request generative art, algorithmic art, flow fields, or particle systems.
- Users want interactive parameter exploration.

## Guardrails

Create original algorithmic art rather than copying existing artists' work to avoid copyright violations.</textarea>
          </article>
        </div>

      </section>

      <div class="bottom-actions">
        <button class="bottom-save">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
          保存技能
        </button>
      </div>
    </main>
  </div>
</body>
</html>
